name: pitaka
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
# Must stay ahead of the published F-Droid app (was 1.0.3+4) so it ships as an
# update. build-name -> Android versionName, build-number -> versionCode.
version: 1.1.0+5

environment:
  sdk: ^3.11.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  fpdart: ^1.1.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_secure_storage: ^9.2.4
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.6
  path: ^1.9.1
  archive: ^3.6.1
  flutter_rust_bridge: ">=2.12.0 <3.0.0"
  uuid: ^4.5.3
  # Reads the legacy Room books.db / wishlist.db (plain, no secrets) during
  # backup restore — exhaustive row/column migration into Drift (Step 7).
  sqlite3: ^2.9.4
  # Official flutter/packages file picker (lighter native footprint than
  # file_picker). Used by the Restore screen to choose a .pitabak archive.
  file_selector: ^1.0.3
  # Non-secret key-value preferences (theme, library name, maintainer name,
  # sort/filter). Secrets stay in flutter_secure_storage — never here.
  shared_preferences: ^2.3.2
  # Remote book covers (#31, §2a.4): disk-cached network image loading, used
  # ONLY for `https://` cover URLs and ONLY when the user opts in via Settings
  # (default OFF). Local covers never use this. Chosen for disk caching + robust
  # load/error states; the well-adopted Flutter standard for network images.
  cached_network_image: ^3.4.1
  # Git blob SHA-1 + salted cover ids for #32 Publish (sha1/sha256). The
  # canonical Dart hashing package; already present transitively.
  crypto: ^3.0.3
  # ISBN lookup + title search (#30): public, no-auth REST against Open Library
  # (primary) and Google Books (fallback). Only hit on explicit user action
  # (scan/lookup/search); only the typed ISBN/title leaves the device. The
  # canonical Flutter HTTP package.
  http: ^1.2.2
  # Barcode + QR scanning (#29, CAMERA): zxing-cpp via Dart FFI. FOSS (MIT), no
  # Google MLKit / Play Services — required so the F-Droid build stays free of
  # proprietary dependencies (the reason the F-Droid edition exists). Mirrors
  # the Kotlin app's ZXing choice. Requested just-in-time; used only on the
  # scan screens.
  flutter_zxing: ^2.3.0
  # QR rendering for in-person library pairing (D40). Pure-Dart QR matrix
  # encoder; we paint it with a CustomPainter (core/widgets/qr_view.dart). No
  # native code, no network. Already in the tree transitively via `pdf`/`barcode`
  # (pinned 3.0.2), so promoting it to direct adds no new download.
  qr: ^3.0.2
  # Cover capture (camera only) - official flutter/packages plugin. Used on the
  # book-detail "replace cover" action; image is downscaled before save.
  image_picker: ^1.1.2
  # Pure-Dart image decode/resize/JPEG-encode for cover downscaling (400x600
  # q80, the Kotlin ImagePipeline contract) and the publish cover pipeline.
  image: ^4.2.0
  # PDF book-list export (Kotlin PdfLibraryRenderer parity): paginated A4,
  # header logo + library name, attribution footer, user-selectable weighted
  # columns. The canonical pure-Dart PDF generation package (no native deps,
  # works on every platform). Rendering only; the column/layout logic is a pure
  # port kept separately so it stays unit-testable without the pdf lib.
  pdf: ^3.11.1
  # Biometric / device-credential gate for the optional vault unlock (#34 B2,
  # default OFF). The official flutter/packages plugin. It ONLY gates release of
  # the hardware-stored secret S; the vault key (MK) never passes through it and
  # the user passphrase is never stored. Paired with flutter_secure_storage
  # (already a dep) which holds S in the Keystore/Keychain.
  local_auth: ^2.3.0
  # Local FFI plugin: cross-compiles + bundles the pitak_crypto Rust core
  # (Argon2id/AES-GCM vault unlock). cargokit runs cargo during the native build.
  rust_lib_pitaka:
    path: rust_builder
  # Hands generated files (export JSON/CSV/PDF, .pitabak backup) to the OS share
  # sheet — which includes "Save to Files" plus WhatsApp/Drive/email, matching
  # the Kotlin app's ACTION_SEND export and the merge "pass a file" workflow.
  # Needed because file_selector has no save-dialog on Android (open only), so
  # the old getSaveLocation path silently failed there. No secrets are shared;
  # the user explicitly picks the target app.
  share_plus: ^12.0.2
  # Opens user-saved "other library" bookmarks in the device's EXTERNAL browser
  # (Bookmarks feature). The canonical Flutter URL package. Only ever launches
  # https links the app already validated against the GitHub/Cloudflare Pages
  # host allow-list; no in-app webview (untrusted third-party pages stay out of
  # the app's process).
  url_launcher: ^6.3.2
  # Free-crop step after capturing a book cover photo (book-detail screen). The
  # canonical Flutter crop plugin; uses the platform-native crop UI (uCrop on
  # Android, registered in AndroidManifest). Crop runs locally on-device before
  # the existing downscale; no network, no new data leaves the device.
  image_cropper: ^12.2.1
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  very_good_analysis: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.20.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    # Bundled library viewer (#32 Publish). Uploaded verbatim to the user's
    # GitHub repo with {{LIBRARY_NAME}}/{{LOGO_DATA_URL}}/{{CONTACT_HTML}}
    # substituted; its CSP img-src mirrors CoverUrlAllowList.
    - assets/publish/index.html
    # Bundled events viewer (#events Publish). Uploaded as events.html with
    # {{LIBRARY_NAME}}/{{POSTERS_HTML}} substituted; img-src is 'self' only
    # (posters are same-origin). Poster markup is baked in (max 2 posters).
    - assets/publish/events.html
    # Pitak app icon, composited into the PDF export footer (attribution line).
    - assets/pdf/app_icon.png
    # Noto Sans TTFs for the PDF export. The `pdf` package's built-in base-14
    # fonts are Latin-1 only; these give broad Indic coverage (the app is a
    # multilingual library catalogue). Loaded at export time via rootBundle and
    # selected per-string by glyph coverage. SIL OFL 1.1 (assets/fonts/OFL.txt).
    - assets/fonts/
    # Branding for the launch/splash gate: the Pitak app icon (default big +
    # small icon) shown before the Library screen. SIL OFL Brahmi font below.
    - assets/branding/app_icon.png

  fonts:
    # Noto Sans Brahmi — renders the Ashokan Brahmi spelling of "Pitak"
    # (𑀧𑀺𑀝𑀓) on the launch/splash screen. This font IS drawn by the Flutter
    # text engine (unlike the PDF-only Noto fonts under assets/fonts/, which the
    # `pdf` package loads itself via rootBundle). SIL OFL 1.1.
    - family: NotoSansBrahmi
      fonts:
        - asset: assets/branding/NotoSansBrahmi-Regular.ttf

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
