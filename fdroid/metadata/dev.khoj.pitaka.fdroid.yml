License: GPL-3.0-or-later
AuthorName: Parallel Line Foundation
SourceCode: https://github.com/PLFIndia/pitak-x
IssueTracker: https://github.com/PLFIndia/pitak-x/issues

AutoName: Pitak

RepoType: git
Repo: https://github.com/PLFIndia/pitak-x.git

Builds:
  # Historic legacy-Kotlin build. Kept verbatim to preserve the F-Droid
  # version history; do not edit.
  - versionName: 1.0.3
    versionCode: 4
    commit: 714af008cb7f009737fd2cea20452ddb460dfe03
    subdir: app
    gradle:
      - yes

  - versionName: 1.1.1
    versionCode: 61
    commit: '1.1.1'
    srclibs:
      - flutter@3.41.1
    sudo:
      - apt-get update
      - apt-get install -y clang cmake ninja-build pkg-config gcc libc-dev rustup
    output: build/app/outputs/flutter-apk/app-x86_64-release.apk
    rm:
      - ios
      - macos
      - windows
      - linux
      - web
    prebuild:
      - rustup default stable
      - rustup target add x86_64-linux-android
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PATH="$$flutter$$/bin:$PATH"
      - export PUB_CACHE=$(pwd)/.pub-cache
      - flutter build apk --release --split-per-abi --target-platform=android-x64
    ndk: r28c

  - versionName: 1.1.1
    versionCode: 62
    commit: '1.1.1'
    srclibs:
      - flutter@3.41.1
    sudo:
      - apt-get update
      - apt-get install -y clang cmake ninja-build pkg-config gcc libc-dev rustup
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    rm:
      - ios
      - macos
      - windows
      - linux
      - web
    prebuild:
      - rustup default stable
      - rustup target add armv7-linux-androideabi
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PATH="$$flutter$$/bin:$PATH"
      - export PUB_CACHE=$(pwd)/.pub-cache
      - flutter build apk --release --split-per-abi --target-platform=android-arm
    ndk: r28c

  - versionName: 1.1.1
    versionCode: 63
    commit: '1.1.1'
    srclibs:
      - flutter@3.41.1
    sudo:
      - apt-get update
      - apt-get install -y clang cmake ninja-build pkg-config gcc libc-dev rustup
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    rm:
      - ios
      - macos
      - windows
      - linux
      - web
    prebuild:
      - rustup default stable
      - rustup target add aarch64-linux-android
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PATH="$$flutter$$/bin:$PATH"
      - export PUB_CACHE=$(pwd)/.pub-cache
      - flutter build apk --release --split-per-abi --target-platform=android-arm64
    ndk: r28c

AutoUpdateMode: Version
UpdateCheckMode: Tags ^[\d.]+$
VercodeOperation:
  - '%c * 10 + 1'
  - '%c * 10 + 2'
  - '%c * 10 + 3'
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
